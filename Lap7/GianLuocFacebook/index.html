<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Facebook Lite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="#" class="header-logo">facebook</a>
    <div class="header-search">Tìm kiếm trên Facebook</div>
    <div class="avatar" style="width:35px; height:35px;"></div>
</header>

<div class="main-container">
    <aside class="sidebar">
        <ul>
            <li class="menu-item"><strong>Ngô Văn Thành</strong></li>
            <li class="menu-item">Bạn bè</li>
            <li class="menu-item">Kỷ niệm</li>
            <li class="menu-item">Đã lưu</li>
        </ul>
    </aside>

    <main>
        <div class="card">
            <div style="display:flex; gap:10px;">
                <div class="avatar"></div>
                <div style="background:#f0f2f5; flex:1; border-radius:20px; padding:10px 15px; color:#65676b;">
                    Thành ơi, bạn đang nghĩ gì thế?
                </div>
            </div>
        </div>

        <div class="card">
            <div class="post-header">
                <div class="avatar"></div>
                <div>
                    <div style="font-weight:bold;">Lập trình Web</div>
                    <div style="font-size:12px; color:#65676b;">Vừa xong</div>
                </div>
            </div>
            <div class="post-content">Dự án đầu tiên!</div>
            <div class="post-img">Hình ảnh minh họa</div>
        </div>
    </main>

    <aside class="sidebar">
        <h4 style="color:#65676b; margin-bottom:10px;">Người liên hệ</h4>
        <ul>
            <li class="menu-item">Linh Chi</li>
            <li class="menu-item">Minh</li>
            <li class="menu-item">An</li>
        </ul>
    </aside>
</div>

</body>
</html>
